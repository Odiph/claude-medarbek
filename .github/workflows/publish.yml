name: Publish to npm

# Publishes to npm via GitHub OIDC "trusted publishing" — no token or secret.
# One-time setup: npmjs.com -> the claude-medarbek package -> Settings ->
# Trusted Publisher -> GitHub Actions (owner: Odiph, repo: claude-medarbek,
# workflow: publish.yml). npm then trusts runs from this workflow directly.
#
# Triggers: a published GitHub Release, a pushed v*.*.* tag, or a manual run
# from the Actions tab. All publish whatever version is in package.json.
on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for trusted publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm (trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Run tests before publishing
        run: npm test

      - name: Publish to npm
        run: npm publish --access public
