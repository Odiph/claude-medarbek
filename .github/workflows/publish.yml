name: Publish to npm

# Publishes to npm either way:
#   - push a version tag like v1.1.0 (git tag v1.1.0 && git push origin v1.1.0), or
#   - publish a GitHub Release whose tag matches the package.json version.
on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # enables npm provenance (verified build attestation)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Run tests before publishing
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
