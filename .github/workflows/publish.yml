name: Publish to npm

# Runs when you publish a GitHub Release. Create a release whose tag matches
# the package.json version (e.g. v1.1.0) and this will publish it to npm.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # enables npm provenance (verified build attestation)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Run tests before publishing
        run: npm test

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
