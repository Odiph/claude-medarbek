name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate JSON files
        run: |
          node -e "JSON.parse(require('fs').readFileSync('verbs.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('verbs.fem.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('settings.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))"

      - name: verbs.json and settings.json stay in sync
        run: |
          node -e "
            const fs = require('fs');
            const verbs = JSON.parse(fs.readFileSync('verbs.json','utf8'));
            const s = JSON.parse(fs.readFileSync('settings.json','utf8'));
            const a = JSON.stringify(verbs);
            const b = JSON.stringify(s.spinnerVerbs.verbs);
            if (a !== b) { console.error('verbs.json and settings.json differ'); process.exit(1); }
            console.log('in sync:', verbs.length, 'verbs');
          "

      - name: CLI smoke test (print, no writes)
        run: node bin/cli.mjs --print

      - name: Unit smoke tests
        run: npm test
